name: Daily News Digest

on:
  # Runs hourly. Each run delivers to users whose current local hour equals
  # their delivery_hour and who have no digest yet for their local date, so
  # every user is served at their own local time (and correctly across DST).
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      user:
        description: "Force delivery for a single profile uuid (optional)"
        type: string
        required: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest worker
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "${{ inputs.user }}" ]; then
            python -m news_bot.main --user "${{ inputs.user }}"
          else
            python -m news_bot.main
          fi
